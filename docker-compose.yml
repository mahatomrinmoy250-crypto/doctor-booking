services:
  backend:
    build:
      context: ./backend
    container_name: doctor-backend
    environment:
      PORT: 5000
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "5000:5000"
    volumes:
      - ./backend/data:/app/backend/data

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000
    container_name: doctor-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
